<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Ufit Motion — Walkthrough</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Inter',system-ui,sans-serif;background:#0A1628;color:#E5E7EB;height:100vh;overflow:hidden;display:flex;flex-direction:column}
  header{padding:14px 20px;background:#060E1D;border-bottom:1px solid rgba(255,255,255,0.08);display:flex;align-items:center;gap:14px}
  .brand{font-weight:800;font-size:18px;letter-spacing:.5px}
  .brand .blue{color:#3B82F6} .brand .yellow{color:#F59E0B}
  .crumb{color:rgba(255,255,255,.5);font-size:13px}
  main{flex:1;display:flex;overflow:hidden}
  aside{width:280px;background:#060E1D;border-right:1px solid rgba(255,255,255,0.08);overflow-y:auto;padding:16px 0;flex-shrink:0}
  aside h3{font-size:11px;text-transform:uppercase;letter-spacing:.7px;color:rgba(255,255,255,.4);padding:0 18px;margin-bottom:8px}
  .bookmark{display:block;width:100%;text-align:left;background:transparent;color:rgba(255,255,255,.7);border:0;padding:9px 18px;font-size:13px;cursor:pointer;font-family:inherit;border-left:3px solid transparent;line-height:1.4}
  .bookmark:hover{background:rgba(255,255,255,.04);color:#fff}
  .bookmark.active{background:rgba(59,130,246,.12);color:#fff;border-left-color:#3B82F6}
  .bookmark .num{display:inline-block;width:30px;color:rgba(255,255,255,.4);font-weight:600}
  #stage{flex:1;position:relative;overflow:hidden;background:#0F1F33}
  .scene{position:absolute;inset:0;opacity:0;transition:opacity .5s ease;pointer-events:none;padding:36px 56px;overflow-y:auto}
  .scene.active{opacity:1;pointer-events:auto}
  .scene-num{font-size:11px;letter-spacing:.7px;text-transform:uppercase;color:rgba(255,255,255,.45);margin-bottom:6px}
  .scene h1{font-size:28px;line-height:1.2;color:#fff;margin-bottom:6px;font-weight:800}
  .scene .subtitle{color:rgba(255,255,255,.65);font-size:14px;margin-bottom:18px;max-width:780px;line-height:1.55}
  .scene .bullets{margin:6px 0 16px;padding-left:22px;color:rgba(255,255,255,.78);max-width:780px;font-size:13px;line-height:1.7}
  .scene .bullets li{margin:3px 0}
  .scene .bullets code{background:rgba(255,255,255,.08);padding:1px 6px;border-radius:3px;font-size:12px}
  .scene .caption{display:flex;gap:12px;align-items:flex-start;background:rgba(245,158,11,.12);border-left:3px solid #F59E0B;border-radius:0 8px 8px 0;padding:12px 16px;margin-top:14px;max-width:880px;font-size:13.5px;line-height:1.5}
  .scene .caption strong{color:#FCD34D}

  /* ---------- Mock UI primitives — high-fidelity Ufit Motion chrome ---------- */
  .mock-row-h{display:flex;gap:14px;flex-wrap:wrap;align-items:flex-start}
  .mock{background:#fff;color:#111827;border-radius:10px;box-shadow:0 14px 40px rgba(0,0,0,.45);overflow:hidden;border:1px solid rgba(0,0,0,.08);max-width:880px;margin-bottom:14px}

  /* Full app shell mock — sidebar + top-nav + body */
  .app-shell{display:flex;background:#F9FAFB;min-height:340px;font-size:13px}
  .app-sb{width:148px;background:#0A2463;color:#fff;padding:14px 0;flex-shrink:0}
  .app-sb-logo{padding:0 14px;font-weight:800;font-size:14px;letter-spacing:.5px;color:#fff;margin-bottom:14px}
  .app-sb-logo .y{color:#F59E0B}
  .app-sb-item{padding:8px 14px;color:rgba(255,255,255,.75);font-size:12px;cursor:default;border-left:3px solid transparent}
  .app-sb-item.active{background:rgba(255,255,255,.08);color:#fff;border-left-color:#F59E0B;font-weight:600}
  .app-main{flex:1;display:flex;flex-direction:column;min-width:0}
  .app-top{height:46px;background:#fff;border-bottom:1px solid #E5E7EB;display:flex;align-items:center;justify-content:space-between;padding:0 14px;font-size:12.5px}
  .app-top-l{font-weight:600;color:#111827}
  .app-top-r{display:flex;gap:6px;align-items:center}
  .app-icon{width:28px;height:28px;border-radius:50%;background:#F3F4F6;display:flex;align-items:center;justify-content:center;font-size:12px;color:#6B7280}
  .app-avatar{width:28px;height:28px;border-radius:50%;background:#1E40AF;color:#fff;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700}
  .app-body{flex:1;padding:16px;overflow:hidden;background:#F9FAFB}
  .app-h2{font-size:18px;font-weight:700;color:#111827;margin-bottom:2px}
  .app-h2-sub{font-size:11.5px;color:#6B7280;margin-bottom:14px}

  /* Stat cards grid */
  .stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:14px}
  .stat-card{background:#fff;border:1px solid #E5E7EB;border-radius:8px;padding:10px}
  .stat-icon{font-size:14px;margin-bottom:4px}
  .stat-val{font-size:18px;font-weight:800;color:#111827;line-height:1}
  .stat-lbl{font-size:10.5px;color:#6B7280;margin-top:3px;text-transform:uppercase;letter-spacing:.3px}
  .stat-card.green .stat-val{color:#10B981}
  .stat-card.yellow .stat-val{color:#F59E0B}

  /* Login portal selector */
  .portal-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;max-width:560px;margin:0 auto}
  .portal-card{padding:18px;background:#fff;border:1px solid #E5E7EB;border-radius:10px;text-align:center}
  .portal-card.sel{border-color:#1E40AF;box-shadow:0 0 0 3px rgba(30,64,175,.15)}
  .portal-emoji{font-size:24px;margin-bottom:6px}
  .portal-name{font-weight:700;color:#111827;font-size:13px}
  .portal-sub{color:#6B7280;font-size:11px;margin-top:2px}

  /* Form / modal styling */
  .modal-card{background:#fff;border-radius:10px;border:1px solid #E5E7EB;max-width:440px}
  .modal-h{background:#1E40AF;color:#fff;padding:12px 18px;font-weight:700;font-size:14px;border-radius:10px 10px 0 0;display:flex;justify-content:space-between;align-items:center}
  .modal-h .x{opacity:.7;cursor:default}
  .modal-b{padding:18px}
  .form-group{margin-bottom:12px}
  .form-label{display:block;font-size:11px;font-weight:600;color:#374151;margin-bottom:4px;text-transform:uppercase;letter-spacing:.3px}
  .form-input{width:100%;padding:8px 10px;border:1px solid #D1D5DB;border-radius:6px;font-size:13px;background:#F9FAFB;color:#111827;font-family:inherit}
  .form-input.lg{padding:12px;font-size:14px}
  .btn-row{display:flex;gap:8px;justify-content:flex-end;margin-top:12px}
  .btn-blue{background:#1E40AF;color:#fff;padding:8px 16px;border-radius:6px;font-size:12.5px;font-weight:600;border:0;display:inline-flex;align-items:center;gap:6px}
  .btn-ghost{background:#fff;color:#6B7280;padding:8px 14px;border-radius:6px;font-size:12.5px;border:1px solid #D1D5DB}
  .btn-yellow{background:#F59E0B;color:#fff;padding:8px 14px;border-radius:6px;font-size:12.5px;font-weight:600;border:0}

  /* Data table */
  .data-table{width:100%;border-collapse:collapse;background:#fff;border-radius:6px;overflow:hidden;font-size:12.5px}
  .data-table th{background:#F3F4F6;color:#374151;padding:8px 10px;text-align:left;font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.3px}
  .data-table td{padding:8px 10px;border-top:1px solid #F3F4F6;color:#374151}
  .data-table tr:hover td{background:#F9FAFB}

  /* Pills + badges */
  .pill{display:inline-block;padding:2px 8px;border-radius:999px;font-size:10.5px;font-weight:600}
  .pill-ok{background:#DCFCE7;color:#15803D}
  .pill-warn{background:#FEF3C7;color:#B45309}
  .pill-err{background:#FEE2E2;color:#B91C1C}
  .pill-muted{background:#F3F4F6;color:#6B7280}
  .pill-blue{background:#DBEAFE;color:#1E3A8A}

  /* Onboarding checklist row */
  .ob-row{display:flex;gap:10px;align-items:center;padding:10px;background:#fff;border-radius:6px;margin-bottom:6px;border:1px solid #E5E7EB}
  .ob-row.done{background:#F9FAFB;opacity:.78}
  .ob-mark{width:22px;height:22px;border-radius:50%;border:2px solid #D1D5DB;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:12px;color:#10B981}
  .ob-row.done .ob-mark{background:#DCFCE7;border-color:#10B981}
  .ob-text{flex:1;font-size:12px;color:#374151}
  .ob-text strong{color:#111827;font-weight:600}
  .ob-text .sub{color:#6B7280;font-size:11px;margin-top:1px}
  .ob-cta{font-size:11.5px;color:#1E40AF;font-weight:600;cursor:default}
  .ob-done-pill{background:#DCFCE7;color:#15803D;font-size:10px;font-weight:600;padding:3px 8px;border-radius:999px}

  /* Misc */
  .kv-list{background:#fff;border-radius:6px;padding:0 12px}
  .kv-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #F3F4F6;font-size:12.5px}
  .kv-row:last-child{border-bottom:0}
  .kv-key{color:#6B7280}
  .kv-val{color:#111827;font-weight:600}
  .label{font-size:11px;color:#6B7280;text-transform:uppercase;letter-spacing:.3px}

  /* Annotation arrows / callouts on top of mocks */
  .callout{display:inline-block;background:#FEF3C7;color:#92400E;font-size:11px;padding:4px 10px;border-radius:4px;font-weight:600;margin-left:8px;border:1px dashed #F59E0B}

  /* Footer + controls */
  footer{background:#060E1D;border-top:1px solid rgba(255,255,255,0.08);padding:12px 20px;display:flex;align-items:center;gap:12px}
  .btn{background:rgba(255,255,255,0.08);color:#fff;border:1px solid rgba(255,255,255,0.14);border-radius:6px;padding:8px 14px;font-size:13px;font-family:inherit;cursor:pointer;font-weight:600}
  .btn:hover{background:rgba(255,255,255,.16)}
  .btn.primary{background:#1E40AF;border-color:#1E40AF}
  .btn.primary:hover{background:#1d3a98}
  #progress{flex:1;height:6px;background:rgba(255,255,255,.1);border-radius:3px;overflow:hidden;margin:0 14px}
  #progress-fill{height:100%;background:#F59E0B;width:0;transition:width .3s linear}
  #count{font-size:12px;color:rgba(255,255,255,.5);min-width:55px;text-align:right}
  @media (max-width:760px){
    aside{display:none}
    .scene{padding:20px}
    .scene h1{font-size:22px}
    .stats-grid{grid-template-columns:repeat(2,1fr)}
    .portal-grid{grid-template-columns:1fr}
  }
</style>
</head>
<body>
<header>
  <div class="brand"><span class="blue">UFIT</span> <span class="yellow">MOTION</span></div>
  <div class="crumb">First-school onboarding walkthrough · ~10 minutes</div>
</header>
<main>
  <aside>
    <h3>Scenes</h3>
    <div id="bookmarks"></div>
  </aside>
  <div id="stage"></div>
</main>
<footer>
  <button class="btn" id="prev">◀ Prev</button>
  <button class="btn primary" id="play">▶ Play</button>
  <button class="btn" id="next">Next ▶</button>
  <div id="progress"><div id="progress-fill"></div></div>
  <span id="count"></span>
</footer>

<script>
/* ============================================================
   Scene definitions — 16 scenes per the design doc, ~37s avg
   for a ~10-minute auto-play.
   Each scene now ships rich high-fidelity mocks with the actual
   Ufit Motion app chrome (sidebar + top-nav + branded panels)
   so the boss sees what the live app actually looks like.
   ============================================================ */
const SCENES = [
  // -----------------------------------------------------------------
  {
    id: "01-cold-load",
    title: "Cold load — portal selector",
    subtitle: "Anyone landing at ufitmotion.onrender.com sees one screen with four roles. Single click to pick yours, then sign in.",
    bullets: [
      "<code>Admin Portal</code> → Ufit operations + administrators",
      "<code>Coach Portal</code> → head coaches + assistant coaches working in the field",
      "<code>Organization Portal</code> → school principals + designated school staff",
      "<code>Parent Portal</code> → parents tracking their child's progress",
      "Forgot Password and Sign-Up With School Code links live below the Sign In form on the Coach Portal",
    ],
    mock: `
      <div class="mock" style="background:#F9FAFB;padding:30px 24px;">
        <div style="text-align:center;margin-bottom:18px;">
          <div style="font-weight:800;font-size:20px;color:#111827;letter-spacing:.5px;">UFIT <span style="color:#F59E0B;">MOTION</span></div>
          <div style="font-size:12px;color:#6B7280;margin-top:4px;">Sign in to your portal</div>
        </div>
        <div class="portal-grid">
          <div class="portal-card sel">
            <div class="portal-emoji">🏢</div>
            <div class="portal-name">Admin Portal</div>
            <div class="portal-sub">Ufit operations &amp; administrators</div>
          </div>
          <div class="portal-card">
            <div class="portal-emoji">🏃</div>
            <div class="portal-name">Coach Portal</div>
            <div class="portal-sub">Head &amp; assistant coaches</div>
          </div>
          <div class="portal-card">
            <div class="portal-emoji">🏫</div>
            <div class="portal-name">Organization Portal</div>
            <div class="portal-sub">Principals &amp; school staff</div>
          </div>
          <div class="portal-card">
            <div class="portal-emoji">👨‍👩‍👧</div>
            <div class="portal-name">Parent Portal</div>
            <div class="portal-sub">View your child's progress</div>
          </div>
        </div>
        <div class="modal-card" style="max-width:440px;margin:18px auto 0;">
          <div class="modal-b">
            <div class="form-group">
              <label class="form-label">Email address</label>
              <div class="form-input lg" style="color:#111827;">admin@ufit.com</div>
            </div>
            <div class="form-group">
              <label class="form-label">Password</label>
              <div class="form-input lg" style="color:#9CA3AF;">••••••••••</div>
            </div>
            <button class="btn-blue" style="width:100%;justify-content:center;padding:11px;font-size:13px;">Sign In</button>
            <div style="text-align:center;margin-top:10px;font-size:11.5px;"><span style="color:#6B7280;">Forgot password?</span></div>
          </div>
        </div>
      </div>`,
    caption: "<strong>What the boss sees.</strong> No marketing. No clutter. Pick your role, type your email and password, you're in."
  },

  // -----------------------------------------------------------------
  {
    id: "02-admin-dashboard",
    title: "Admin signs in → Dashboard",
    subtitle: "First load post-go-live: zero schools, zero coaches, zero sessions. The dashboard tells the boss exactly what to do next via the onboarding checklist.",
    bullets: [
      "Welcome card greets by first name + role badge",
      "Stats grid: schools, active coaches, sessions this week, EOD compliance, open incidents",
      "Onboarding checklist appears until a school + coaches + sessions exist",
      "Quick Actions card has Add School + Add Coach + Review Incidents shortcuts",
      "Bell icon top-right shows unread notifications; ? icon opens Help &amp; Feedback modal",
    ],
    mock: `
      <div class="mock">
        <div class="app-shell">
          <div class="app-sb">
            <div class="app-sb-logo">UFIT <span class="y">·</span></div>
            <div class="app-sb-item active">📊 Dashboard</div>
            <div class="app-sb-item">🏫 Schools</div>
            <div class="app-sb-item">👟 Coaches</div>
            <div class="app-sb-item">👦 Students</div>
            <div class="app-sb-item">📋 EOD Reports</div>
            <div class="app-sb-item">⚠ Incidents</div>
            <div class="app-sb-item">📈 Reports</div>
            <div class="app-sb-item">⚙ Settings</div>
          </div>
          <div class="app-main">
            <div class="app-top">
              <div class="app-top-l">Dashboard</div>
              <div class="app-top-r">
                <div class="app-icon">?</div>
                <div class="app-icon">🔔</div>
                <div class="app-avatar">A</div>
              </div>
            </div>
            <div class="app-body">
              <div style="background:#1E40AF;color:#fff;padding:14px 16px;border-radius:8px;margin-bottom:12px;">
                <div style="font-size:15px;font-weight:700;">Welcome back, Admin.</div>
                <div style="font-size:11px;opacity:.85;margin-top:2px;"><span class="pill" style="background:#F59E0B;color:#fff;margin-right:6px;">Admin</span>Saturday, May 9, 2026</div>
              </div>
              <div class="stats-grid">
                <div class="stat-card"><div class="stat-icon">🏫</div><div class="stat-val">0</div><div class="stat-lbl">Schools</div></div>
                <div class="stat-card"><div class="stat-icon">👟</div><div class="stat-val">0</div><div class="stat-lbl">Coaches</div></div>
                <div class="stat-card"><div class="stat-icon">📅</div><div class="stat-val">0</div><div class="stat-lbl">Sessions / wk</div></div>
                <div class="stat-card yellow"><div class="stat-icon">📋</div><div class="stat-val">—</div><div class="stat-lbl">EOD compliance</div></div>
              </div>
              <div style="background:#fff;border:1px solid #E5E7EB;border-radius:8px;padding:14px;margin-bottom:8px;">
                <div style="font-weight:700;color:#111827;font-size:13px;margin-bottom:2px;">Getting started</div>
                <div style="color:#6B7280;font-size:11px;margin-bottom:10px;">A few steps to get your first school live on Ufit Motion.</div>
                <div class="ob-row"><div class="ob-mark">○</div><div class="ob-text"><strong>Add your first school</strong><div class="sub">Lincoln Elementary, Roosevelt ES, etc.</div></div><span class="ob-cta">Add School →</span></div>
                <div class="ob-row"><div class="ob-mark">○</div><div class="ob-text"><strong>Add your coaches</strong><div class="sub">Send invites individually or in bulk via paste / CSV.</div></div><span class="ob-cta">Add Coaches →</span></div>
                <div class="ob-row"><div class="ob-mark">○</div><div class="ob-text"><strong>Schedule the first session</strong><div class="sub">Sessions log automatically once coaches start filing EOD reports.</div></div><span class="ob-cta">Open Coaches →</span></div>
              </div>
            </div>
          </div>
        </div>
      </div>`,
    caption: "<strong>Empty state isn't blank.</strong> The dashboard literally tells you 'add school, then coaches, then schedule sessions.' No guessing what to click."
  },

  // -----------------------------------------------------------------
  {
    id: "03-settings",
    title: "Settings tour",
    subtitle: "Account profile, password change, organization details, and privacy/terms links. Boring on purpose — no customization knobs to tempt the boss into breaking something.",
    bullets: [
      "<strong>My Profile</strong> — name, email, phone, position title (read-only org-bound fields hidden)",
      "<strong>Change Password</strong> — current → new (8+ chars, PBKDF2-SHA-256 hash)",
      "<strong>Organization Details</strong> (CEO only) — name, type, billing contact",
      "<strong>Sign Out</strong> — clears session, 8-hour idle timeout",
      "Footer: links to Privacy Policy and Terms of Service (FERPA-aware self-authored copy)",
    ],
    mock: `
      <div class="mock">
        <div class="app-shell">
          <div class="app-sb">
            <div class="app-sb-logo">UFIT <span class="y">·</span></div>
            <div class="app-sb-item">📊 Dashboard</div>
            <div class="app-sb-item">🏫 Schools</div>
            <div class="app-sb-item">👟 Coaches</div>
            <div class="app-sb-item">👦 Students</div>
            <div class="app-sb-item">📋 EOD Reports</div>
            <div class="app-sb-item">⚠ Incidents</div>
            <div class="app-sb-item">📈 Reports</div>
            <div class="app-sb-item active">⚙ Settings</div>
          </div>
          <div class="app-main">
            <div class="app-top"><div class="app-top-l">Settings</div><div class="app-top-r"><div class="app-icon">?</div><div class="app-icon">🔔</div><div class="app-avatar">A</div></div></div>
            <div class="app-body">
              <div class="app-h2">Settings</div>
              <div class="app-h2-sub">Manage your account, password, and organization details.</div>
              <div class="kv-list">
                <div class="kv-row"><span class="kv-key">My Profile</span><span class="kv-val">Admin User · admin@ufit.com →</span></div>
                <div class="kv-row"><span class="kv-key">Change Password</span><span class="kv-val">Update your sign-in password →</span></div>
                <div class="kv-row"><span class="kv-key">Organization Details</span><span class="kv-val">Ufit · School District →</span></div>
                <div class="kv-row"><span class="kv-key">Privacy Policy</span><span class="kv-val">/privacy →</span></div>
                <div class="kv-row"><span class="kv-key">Terms of Service</span><span class="kv-val">/terms →</span></div>
                <div class="kv-row"><span class="kv-key" style="color:#B91C1C;">Sign Out</span><span class="kv-val" style="color:#B91C1C;">End session →</span></div>
              </div>
            </div>
          </div>
        </div>
      </div>`,
    caption: "<strong>Bureaucracy in one place.</strong> Everything administrative — and nothing else — lives behind one icon."
  },

  // -----------------------------------------------------------------
  {
    id: "04-add-school",
    title: "Add a school",
    subtitle: "One modal. Org → name → city/state → optional principal. Saving auto-emails the principal a set-password invite.",
    bullets: [
      "Pick or create the parent organization (e.g. Lincoln USD)",
      "School name + type (Elementary / Middle / K-8 / Pre-K)",
      "Optional principal name + email — invite is auto-sent on save",
      "School appears in the list within 200ms; HubSpot sync fires in the background",
      "Principal status badge shows ⏱ Pending until they set their password",
    ],
    mock: `
      <div class="mock-row-h">
        <div class="mock modal-card">
          <div class="modal-h">Add School <span class="x">×</span></div>
          <div class="modal-b">
            <div class="form-group"><label class="form-label">Organization</label><div class="form-input">Lincoln Unified School District</div></div>

const stage = document.getElementById('stage');
const bookmarks = document.getElementById('bookmarks');
const progFill = document.getElementById('progress-fill');
const countEl = document.getElementById('count');

let current = 0;
let playing = false;
let timer = null;
const SCENE_MS = 37000;  // ~10 min total for 17 scenes

SCENES.forEach((s, i) => {
  const div = document.createElement('div');
  div.className = 'scene';
  div.id = `scene-${i}`;
  const bulletsHtml = (s.bullets || []).map(b => `<li>${b}</li>`).join('');
  div.innerHTML = `
    <div class="scene-num">Scene ${String(i + 1).padStart(2, '0')} of ${SCENES.length}</div>
    <h1>${s.title}</h1>
    <div class="subtitle">${s.subtitle}</div>
    <ul class="bullets">${bulletsHtml}</ul>
    ${s.mock || ''}
    <div class="caption">${s.caption}</div>
  `;
  stage.appendChild(div);

  const b = document.createElement('button');
  b.className = 'bookmark';
  b.dataset.idx = i;
  b.innerHTML = `<span class="num">${String(i + 1).padStart(2, '0')}</span> ${s.title}`;
  b.addEventListener('click', () => goTo(i));
  bookmarks.appendChild(b);
});

function goTo(i) {
  if (i < 0 || i >= SCENES.length) return;
  document.querySelectorAll('.scene').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.bookmark').forEach(el => el.classList.remove('active'));
  document.getElementById(`scene-${i}`).classList.add('active');
  document.querySelector(`.bookmark[data-idx="${i}"]`).classList.add('active');
  current = i;
  countEl.textContent = `${i + 1} / ${SCENES.length}`;
  progFill.style.width = `${((i + 1) / SCENES.length) * 100}%`;
  document.querySelector(`.bookmark[data-idx="${i}"]`).scrollIntoView({ block: 'nearest', behavior: 'smooth' });
}

function next() { goTo(Math.min(SCENES.length - 1, current + 1)); }
function prev() { goTo(Math.max(0, current - 1)); }

document.getElementById('next').addEventListener('click', () => { stop(); next(); });
document.getElementById('prev').addEventListener('click', () => { stop(); prev(); });
document.getElementById('play').addEventListener('click', () => playing ? stop() : play());
document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowRight') next();
  else if (e.key === 'ArrowLeft') prev();
  else if (e.key === ' ') { e.preventDefault(); playing ? stop() : play(); }
});

function play() {
  playing = true;
  document.getElementById('play').textContent = '⏸ Pause';
  timer = setInterval(() => {
    if (current >= SCENES.length - 1) return stop();
    next();
  }, SCENE_MS);
}
function stop() {
  playing = false;
  document.getElementById('play').textContent = '▶ Play';
  clearInterval(timer);
}

goTo(0);
</script>
