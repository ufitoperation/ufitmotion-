<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Ufit Motion — Principal Training</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Inter',system-ui,sans-serif;background:#0A1628;color:#E5E7EB;height:100vh;overflow:hidden;display:flex;flex-direction:column}
  header{padding:14px 20px;background:#060E1D;border-bottom:1px solid rgba(255,255,255,.08);display:flex;align-items:center;gap:14px}
  .brand{font-weight:800;font-size:18px;letter-spacing:.5px}
  .brand .y{color:#F59E0B}
  .crumb{color:rgba(255,255,255,.5);font-size:13px}
  .role-pill{padding:3px 10px;background:#F59E0B;border-radius:999px;font-size:11px;font-weight:700;letter-spacing:.5px;text-transform:uppercase}
  main{flex:1;display:flex;overflow:hidden}
  aside{width:260px;background:#060E1D;border-right:1px solid rgba(255,255,255,.08);overflow-y:auto;padding:16px 0;flex-shrink:0}
  aside h3{font-size:11px;text-transform:uppercase;letter-spacing:.7px;color:rgba(255,255,255,.4);padding:0 18px;margin-bottom:8px}
  .bk{display:block;width:100%;text-align:left;background:transparent;color:rgba(255,255,255,.7);border:0;padding:9px 18px;font-size:13px;cursor:pointer;font-family:inherit;border-left:3px solid transparent;line-height:1.4}
  .bk:hover{background:rgba(255,255,255,.04);color:#fff}
  .bk.active{background:rgba(245,158,11,.15);color:#fff;border-left-color:#F59E0B}
  .bk .num{display:inline-block;width:30px;color:rgba(255,255,255,.4);font-weight:600}
  #stage{flex:1;position:relative;overflow:hidden;background:#0F1F33}
  .scene{position:absolute;inset:0;opacity:0;transition:opacity .5s ease;pointer-events:none;padding:36px 56px;overflow-y:auto}
  .scene.active{opacity:1;pointer-events:auto}
  .scene-num{font-size:11px;letter-spacing:.7px;text-transform:uppercase;color:rgba(255,255,255,.45);margin-bottom:6px}
  .scene h1{font-size:28px;line-height:1.2;color:#fff;margin-bottom:6px;font-weight:800}
  .subtitle{color:rgba(255,255,255,.65);font-size:14px;margin-bottom:18px;max-width:780px;line-height:1.55}
  .steps{margin:6px 0 16px;padding-left:0;list-style:none;color:rgba(255,255,255,.85);max-width:780px;counter-reset:stp}
  .steps li{margin:6px 0;display:flex;gap:10px;font-size:13px;line-height:1.6}
  .steps li::before{content:counter(stp);counter-increment:stp;width:22px;height:22px;background:#F59E0B;color:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:11px;flex-shrink:0;margin-top:1px}
  .steps code{background:rgba(255,255,255,.08);padding:1px 6px;border-radius:3px;font-size:12px}
  .caption{display:flex;gap:12px;background:rgba(245,158,11,.12);border-left:3px solid #F59E0B;border-radius:0 8px 8px 0;padding:12px 16px;margin-top:14px;max-width:880px;font-size:13.5px;line-height:1.5}
  .caption strong{color:#FCD34D}
  .mock{background:#fff;color:#111827;border-radius:10px;box-shadow:0 14px 40px rgba(0,0,0,.45);overflow:hidden;border:1px solid rgba(0,0,0,.08);max-width:780px;margin-bottom:14px;padding:20px}
  .mock-h{background:#F59E0B;color:#fff;font-weight:700;padding:12px 18px;font-size:13px;margin:-20px -20px 14px;border-radius:10px 10px 0 0}
  .row{display:flex;gap:10px;flex-wrap:wrap;margin:10px 0}
  .pill{display:inline-block;padding:2px 9px;border-radius:999px;font-size:11px;font-weight:600}
  .pill-ok{background:#DCFCE7;color:#15803D} .pill-warn{background:#FEF3C7;color:#92400E} .pill-red{background:#FEE2E2;color:#B91C1C}
  .form{background:#F9FAFB;padding:8px 10px;border-radius:6px;font-size:12.5px;color:#111827;border:1px solid #E5E7EB;margin-bottom:6px}
  .lbl{font-size:10.5px;color:#6B7280;text-transform:uppercase;letter-spacing:.3px;margin-bottom:2px}
  footer{background:#060E1D;border-top:1px solid rgba(255,255,255,.08);padding:12px 20px;display:flex;align-items:center;gap:12px}
  .btn{background:rgba(255,255,255,.08);color:#fff;border:1px solid rgba(255,255,255,.14);border-radius:6px;padding:8px 14px;font-size:13px;font-family:inherit;cursor:pointer;font-weight:600}
  .btn:hover{background:rgba(255,255,255,.16)}
  .btn.primary{background:#F59E0B;border-color:#F59E0B;color:#fff}
  #progress{flex:1;height:6px;background:rgba(255,255,255,.1);border-radius:3px;overflow:hidden;margin:0 14px}
  #fill{height:100%;background:#F59E0B;width:0;transition:width .3s linear}
  #count{font-size:12px;color:rgba(255,255,255,.5);min-width:55px;text-align:right}
  @media (max-width:760px){aside{display:none}.scene{padding:20px}.scene h1{font-size:22px}}
</style>
</head>
<body>
<header>
  <div class="brand">UFIT <span class="y">MOTION</span></div>
  <div class="role-pill">Principal Training</div>
  <div class="crumb">Press-play tutorial · ~3 minutes</div>
</header>
<main>
  <aside><h3>Scenes</h3><div id="bk"></div></aside>
  <div id="stage"></div>
</main>
<footer>
  <button class="btn" id="prev">◀ Prev</button>
  <button class="btn primary" id="play">▶ Play</button>
  <button class="btn" id="next">Next ▶</button>
  <div id="progress"><div id="fill"></div></div>
  <span id="count"></span>
</footer>
<script>
const SCENES = [
  {
    title: "Welcome, Principal",
    sub: "Designed for a 30-second scan between bell rings. You read; you don't write. Five things to know.",
    steps: [
      "You see ONLY your school's data. No cross-school visibility.",
      "Open incidents pin to the top of your dashboard — never miss one.",
      "EODs from your coaches arrive in real time.",
      "Quarterly satisfaction surveys are your one writing task.",
      "Watch this once. Bookmark the URL. You'll be set.",
    ],
    mock: `<div class="mock"><div class="mock-h">Lincoln Elementary · Principal Dashboard</div>
      <p style="font-size:13px;color:#374151;line-height:1.55;">A read-mostly platform for school staff who need to monitor program health without doing data entry.</p></div>`,
    cap: "<strong>30-second scan.</strong> Designed for a principal between bell rings. No tables of raw data, no walls of numbers."
  },
  {
    title: "Logging in",
    sub: "Two-step. Once your password is set from the email link, this is muscle memory.",
    steps: [
      "Open <code>ufitmotion.onrender.com/login</code>",
      "Click <strong>Organization Portal</strong> (school icon)",
      "Email + password → <strong>Sign In</strong>",
      "First time? Use the Set Password link from the email Ufit sent you.",
    ],
    mock: `<div class="mock"><div class="mock-h">Sign in to Organization Portal</div>
      <div class="lbl">Email address</div><div class="form">sarah@lincoln.edu</div>
      <div class="lbl">Password</div><div class="form">••••••••••••</div>
      <div style="background:#F59E0B;color:#fff;padding:11px;border-radius:6px;text-align:center;font-weight:600;margin-top:8px;">Sign In</div></div>`,
    cap: "<strong>Forgot password?</strong> Click the link below Sign In; reset link arrives in ~30 sec."
  },
  {
    title: "Dashboard tour",
    sub: "What you see when you log in. Open incidents, EOD compliance, week's session count, latest EOD card.",
    steps: [
      "<strong>Open incidents banner</strong> (red, top of page) — any unresolved injuries / behavior / facility issues",
      "<strong>EOD on-time %</strong> — what fraction of this week's sessions had EODs filed same-day",
      "<strong>Sessions logged</strong> — count for this week",
      "<strong>Active students</strong> — total enrolled in your PE program",
      "<strong>Latest EOD card</strong> — most recent end-of-day report from your school's coaches",
    ],
    mock: `<div class="mock"><div class="mock-h">Lincoln Elementary · Spring 2026</div>
      <div style="background:#FEF2F2;border-left:3px solid #B91C1C;padding:10px;border-radius:0 6px 6px 0;font-size:12px;color:#991B1B;margin-bottom:10px;"><strong>1 open incident</strong> — Sam Quinn, ankle injury (Medium, 2026-05-09) → Review</div>
      <div class="row">
        <div style="flex:1;padding:8px;background:#F9FAFB;border-radius:6px;text-align:center;"><div style="font-size:18px;font-weight:800;color:#10B981;">96%</div><div style="font-size:10px;color:#6B7280;">EOD ON TIME</div></div>
        <div style="flex:1;padding:8px;background:#F9FAFB;border-radius:6px;text-align:center;"><div style="font-size:18px;font-weight:800;">12</div><div style="font-size:10px;color:#6B7280;">SESSIONS</div></div>
        <div style="flex:1;padding:8px;background:#F9FAFB;border-radius:6px;text-align:center;"><div style="font-size:18px;font-weight:800;">126</div><div style="font-size:10px;color:#6B7280;">STUDENTS</div></div>
      </div></div>`,
    cap: "<strong>Open incidents are pinned.</strong> If something needs your attention, you'll see it the moment you log in."
  },
  {
    title: "Reading an EOD",
    sub: "What the coach saw and did during a session. Open this when something stands out — high engagement, a behavior moment, an incident flag.",
    steps: [
      "Sidebar → <strong>EOD Reports</strong>",
      "Reports listed newest first. Click any row to expand.",
      "You see: activities, engagement, behavior summary, success story, challenge, any flagged incidents",
      'Reports flagged "principal communication needed" highlight at the top',
      "No edits — read only.",
    ],
    mock: `<div class="mock"><div class="mock-h">EOD · Lincoln · Period 3 · Coach Williams · 2026-05-09</div>
      <div class="lbl">Activities completed</div><div class="form" style="font-size:12px;">Dribbling drills · Chest pass · 4-on-4 game</div>
      <div class="lbl">Engagement</div><div class="form" style="font-size:12px;">High — 28 of 30 students active most of session</div>
      <div class="lbl">Success story</div><div class="form" style="font-size:12px;">Marcus made his first 3-pointer; whole class cheered.</div>
      <span class="pill pill-ok">✓ On time · 3:42 PM</span></div>`,
    cap: "<strong>You read; you don't write.</strong> EODs come from your coaches in real time."
  },
  {
    title: "Student progress",
    sub: "Read-only view of every student in your school's PE program. Baseline → current → growth. Search or filter by grade.",
    steps: [
      "Sidebar → <strong>My Students</strong>",
      "Search by name OR filter by grade level",
      "Click a student → see baseline / current / growth across all assessed skills",
      "Plus: behavior readiness ratings + attendance %",
      "If a parent asks, you can show them the same view they'd see in their parent portal",
    ],
    mock: `<div class="mock"><div class="mock-h">Sam Quinn · Spring 2026 Progress</div>
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;"><div><div style="font-weight:800;font-size:18px;">78 / 100</div><div style="font-size:11px;color:#6B7280;">Overall UFIT score</div></div><span class="pill pill-ok">On Track</span></div>
      <div style="height:6px;background:#F3F4F6;border-radius:999px;overflow:hidden;"><div style="width:78%;height:100%;background:linear-gradient(90deg,#10B981,#3B82F6);"></div></div></div>`,
    cap: "<strong>No grades, no rankings.</strong> Just baseline, current, and the growth between."
  },
  {
    title: "Filing a satisfaction survey",
    sub: "Quarterly. Ufit operations sends a reminder. Your responses go to ops, not to the coaches you're rating.",
    steps: [
      "Sidebar → <strong>Surveys</strong>",
      "Click <strong>+ New Survey</strong>",
      "Rate: overall satisfaction (1-5) · program impact (1-5) · communication quality (1-5)",
      "Free-text suggestions box for anything else",
      "Submit. Coaches don't see your individual ratings — only ops aggregates.",
    ],
    mock: `<div class="mock"><div class="mock-h">Quarterly Satisfaction Survey · Spring 2026</div>
      <div class="lbl">Overall Satisfaction</div><div class="form">★★★★☆ — 4 of 5</div>
      <div class="lbl">Program Impact</div><div class="form">★★★★★ — 5 of 5</div>
      <div class="lbl">Communication Quality</div><div class="form">★★★★☆ — 4 of 5</div>
      <div class="lbl">Suggestions</div><div class="form" style="font-size:12px;">Would love a quarterly in-person meeting with the coach team.</div></div>`,
    cap: "<strong>Your feedback matters.</strong> Ops uses surveys to coach the coaches and improve the program."
  },
  {
    title: "You're set.",
    sub: "Log in once a week (or more if something pings you). Read the dashboard. Click into anything that stands out. File the survey when prompted.",
    steps: [
      "Bookmark <code>ufitmotion.onrender.com/login</code>",
      "Log in once or twice a week (or more during the first month)",
      "If a critical incident hits, you'll see it at the top of your dashboard immediately",
      "Quarterly: file the satisfaction survey",
      "Stuck? Top-nav <strong>?</strong> icon → ops responds within hours",
    ],
    mock: `<div class="mock" style="background:linear-gradient(135deg,#F59E0B,#D97706);color:#fff;text-align:center;padding:32px;">
      <div style="font-weight:900;font-size:24px;letter-spacing:.5px;">UFIT <span style="color:#fff;">MOTION</span></div>
      <div style="opacity:.9;margin-top:6px;font-size:13px;">A 30-second window into your school's PE program.</div></div>`,
    cap: "<strong>You're not the audience for data entry.</strong> You're the audience for trust. Every screen reflects that."
  }
];

const stage=document.getElementById('stage'),bk=document.getElementById('bk'),fill=document.getElementById('fill'),count=document.getElementById('count');
let cur=0,playing=false,timer=null;const MS=27000;
SCENES.forEach((s,i)=>{const d=document.createElement('div');d.className='scene';d.id='s'+i;
const stp=(s.steps||[]).map(x=>`<li>${x}</li>`).join('');
d.innerHTML=`<div class="scene-num">Scene ${String(i+1).padStart(2,'0')} of ${SCENES.length}</div><h1>${s.title}</h1><div class="subtitle">${s.sub}</div><ul class="steps">${stp}</ul>${s.mock||''}<div class="caption">${s.cap}</div>`;
stage.appendChild(d);
const b=document.createElement('button');b.className='bk';b.dataset.idx=i;b.innerHTML=`<span class="num">${String(i+1).padStart(2,'0')}</span> ${s.title}`;b.onclick=()=>go(i);bk.appendChild(b);});
function go(i){if(i<0||i>=SCENES.length)return;document.querySelectorAll('.scene').forEach(e=>e.classList.remove('active'));document.querySelectorAll('.bk').forEach(e=>e.classList.remove('active'));document.getElementById('s'+i).classList.add('active');document.querySelector(`.bk[data-idx="${i}"]`).classList.add('active');cur=i;count.textContent=`${i+1} / ${SCENES.length}`;fill.style.width=`${((i+1)/SCENES.length)*100}%`;document.querySelector(`.bk[data-idx="${i}"]`).scrollIntoView({block:'nearest',behavior:'smooth'});}
document.getElementById('next').onclick=()=>{stop();go(Math.min(SCENES.length-1,cur+1));};
document.getElementById('prev').onclick=()=>{stop();go(Math.max(0,cur-1));};
document.getElementById('play').onclick=()=>playing?stop():play();
addEventListener('keydown',e=>{if(e.key==='ArrowRight')go(Math.min(SCENES.length-1,cur+1));else if(e.key==='ArrowLeft')go(Math.max(0,cur-1));else if(e.key===' '){e.preventDefault();playing?stop():play();}});
function play(){playing=true;document.getElementById('play').textContent='⏸ Pause';timer=setInterval(()=>{if(cur>=SCENES.length-1)return stop();go(cur+1);},MS);}
function stop(){playing=false;document.getElementById('play').textContent='▶ Play';clearInterval(timer);}
go(0);
</script>
</body>
</html>
